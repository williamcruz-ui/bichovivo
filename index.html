<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BichoVivo — Tamagotchi Game</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}-webkit-font-smoothing:antialiased;body{font-family:ui-rounded,'SF Pro Rounded',-apple-system,'Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}img,svg{display:block;max-width:100%;}a{color:inherit;}ul{list-style:none;}button{font-family:inherit;cursor:pointer;}
@keyframes bv-breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}@keyframes bv-sway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}@keyframes bv-blink{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(.08)}}@keyframes bv-float{0%{transform:translateX(-50%) translateY(0) scale(.7);opacity:0}15%{opacity:1}100%{transform:translateX(-50%) translateY(-82px) scale(1.5);opacity:0}}@keyframes bv-z{0%{transform:translateY(0) scale(.7);opacity:0}25%{opacity:.95}100%{transform:translateY(-36px) translateX(16px) scale(1.25);opacity:0}}@keyframes bv-beam{from{transform:rotate(0)}to{transform:rotate(360deg)}}@keyframes bv-ringpulse{0%,100%{opacity:.22}50%{opacity:.5}}@keyframes bv-pop{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}@keyframes bv-floatbg{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}@keyframes bv-shake{0%,100%{transform:translateX(0) rotate(0)}20%{transform:translateX(-3px) rotate(-3deg)}40%{transform:translateX(3px) rotate(3deg)}60%{transform:translateX(-2px) rotate(-2deg)}80%{transform:translateX(2px) rotate(2deg)}}@keyframes bv-hop{0%{transform:translateY(0)}30%{transform:translateY(-14px)}55%{transform:translateY(0)}72%{transform:translateY(-6px)}100%{transform:translateY(0)}}@keyframes bv-steam{0%{transform:translateY(0) scale(.5);opacity:0}30%{opacity:.55}100%{transform:translateY(-18px) scale(1.1);opacity:0}}
.bv-root{font-family:ui-rounded,'SF Pro Rounded',-apple-system,'Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
.bv-root *{box-sizing:border-box}
.bv-breathe{animation:bv-breathe 3.4s ease-in-out infinite;transform-origin:50% 78%}
.bv-sway{animation:bv-sway 5s ease-in-out infinite;transform-origin:50% 92%}
.bv-eye{animation:bv-blink 4.6s ease-in-out infinite;transform-origin:center}
.bv-z{animation:bv-z 2.4s ease-in-out infinite}
.bv-beam{animation:bv-beam 3.6s linear infinite;transform-origin:center}
.bv-pop{animation:bv-pop .24s ease-out}
.bv-floatbg{animation:bv-floatbg 7.5s ease-in-out infinite}
.bv-emote{animation:bv-float 1.3s ease-out forwards}
.bv-ring{animation:bv-ringpulse 3s ease-in-out infinite}
.bv-shake{animation:bv-shake .35s ease-in-out infinite}
.bv-hop{animation:bv-hop .6s ease-out}
.bv-steam{animation:bv-steam 1.1s ease-out infinite}
.bv-btn{transition:transform .08s ease, filter .15s ease}
.bv-btn:active{transform:scale(.92)}
.bv-btn:disabled{filter:grayscale(.6) opacity(.5)}
.bv-tap{transition:transform .08s ease}.bv-tap:active{transform:scale(.94)}
.bv-blip{cursor:pointer}
@media (prefers-reduced-motion: reduce){.bv-breathe,.bv-sway,.bv-eye,.bv-z,.bv-beam,.bv-floatbg,.bv-ring,.bv-shake,.bv-hop,.bv-steam{animation:none!important}}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const Apple = () => <span>🍎</span>;
const Gamepad2 = () => <span>🎮</span>;
const Moon = () => <span>🌙</span>;
const Sun = () => <span>☀️</span>;
const Droplets = () => <span>💧</span>;
const Heart = () => <span>❤️</span>;
const Radar = () => <span>📡</span>;
const RefreshCw = () => <span>🔄</span>;
const Pencil = () => <span>✏️</span>;
const Check = () => <span>✓</span>;
const X = () => <span>✕</span>;
const Wifi = () => <span>📶</span>;
const WifiOff = () => <span>📵</span>;
const ArrowLeft = () => <span>←</span>;
const Hand = () => <span>👋</span>;
const Volume2 = () => <span>🔊</span>;
const VolumeX = () => <span>🔇</span>;

const TICK_MS = 3000;
const INITIAL = { saciedade: 80, felicidade: 75, energia: 90, higiene: 85, saude: 90 };
const STORAGE_KEY = "bichovivo:save:v2";
const clamp = (v) => Math.max(0, Math.min(100, Math.round(v)));

const TEMPERS = {
  "Brincalhão": { emoji: "🎈", play: 1.5, happyDecay: 1.3, anger: 1.0, calm: 1.0 },
  "Tranquilo":  { emoji: "😌", play: 1.0, happyDecay: 0.7, anger: 0.6, calm: 1.2 },
  "Resmungão":  { emoji: "😤", play: 0.9, happyDecay: 1.2, anger: 1.6, calm: 0.8 },
  "Carente":    { emoji: "🥺", play: 1.1, happyDecay: 1.5, anger: 1.0, calm: 1.5 },
};
const TEMPER_KEYS = Object.keys(TEMPERS);
const pickTemper = () => TEMPER_KEYS[Math.floor(Math.random() * TEMPER_KEYS.length)];

const POOL = [
  { n: "Tobi", e: "🐶", c: "#FFB37B" }, { n: "Pixel", e: "🐱", c: "#9AD0FF" },
  { n: "Maju", e: "🐰", c: "#FFC2DC" }, { n: "Zé", e: "🦖", c: "#9CE3B0" },
  { n: "Nina", e: "🐼", c: "#D9D9E6" }, { n: "Bolt", e: "🦊", c: "#FFA56B" },
  { n: "Coco", e: "🐸", c: "#A6E86B" }, { n: "Lola", e: "🐥", c: "#FFE08A" },
  { n: "Bento", e: "🐢", c: "#86D6B0" }, { n: "Mia", e: "🦉", c: "#C7B4FF" },
];

function makeNearby() {
  const count = 3 + Math.floor(Math.random() * 4);
  return [...POOL].sort(() => Math.random() - 0.5).slice(0, count).map((p, i) => ({
    id: `${p.n}-${i}-${Math.floor(Math.random() * 9999)}`,
    name: p.n, emoji: p.e, color: p.c,
    dist: Math.round((0.2 + Math.random() * 1.75) * 10) / 10,
    angle: Math.random() * Math.PI * 2,
    online: Math.random() > 0.28,
  })).sort((a, b) => a.dist - b.dist);
}

function stageOf(ageS) {
  if (ageS < 90) return { key: "filhote", label: "Filhote", scale: 0.86, top: "tuft" };
  if (ageS < 240) return { key: "crianca", label: "Criança", scale: 0.97, top: "tuft" };
  if (ageS < 480) return { key: "jovem", label: "Jovem", scale: 1.06, top: "sprout" };
  return { key: "adulto", label: "Adulto", scale: 1.15, top: "crown" };
}

function baseMood(s) {
  if (s.saude < 25) return "sick";
  if (s.saciedade < 20) return "hungry";
  if (s.higiene < 20) return "dirty";
  if (s.felicidade < 25) return "sad";
  if (s.felicidade > 75 && s.saude > 60) return "happy";
  return "ok";
}

const MOOD_MSG = {
  ok: "Tá de boa 😌", happy: "Super feliz! 🥰", hungry: "Tô com fominha… 🍽️",
  dirty: "Preciso de um banho 🫧", sad: "Brinca comigo? 🥺", sick: "Não tô bem… 🤒",
  sleep: "Zzz… dormindo 💤", ko: "Desmaiei… 😵", angry: "Grr… me deixa! 😠",
};

function createAudio() {
  let ctx = null, master = null, muted = false;
  const ensure = () => {
    if (!ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      ctx = new AC();
      master = ctx.createGain();
      master.gain.value = muted ? 0 : 0.16;
      master.connect(ctx.destination);
    }
    if (ctx.state === "suspended") ctx.resume();
    return ctx;
  };
  const play = (name) => {
    if (!ensure()) return;
    // Simplified: just beep
    const t = ctx.currentTime;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.frequency.value = 440;
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + 0.1);
  };
  const setMuted = (m) => { muted = m; if (master) master.gain.value = m ? 0 : 0.16; };
  return { play, setMuted };
}

function Creature({ mood, saude, stage, look }) {
  const angry = mood === "angry";
  const c = angry ? { body: "#FF9E8A", accent: "#E8705A", belly: "#FFE3DA" }
    : mood === "ko" ? { body: "#C7C2BC", accent: "#A39E98", belly: "#E9EFE1" }
    : saude < 35 ? { body: "#CFD8C0", accent: "#A8B49A", belly: "#E9EFE1" }
    : saude < 60 ? { body: "#F0D3A6", accent: "#D99B57", belly: "#FFF1DC" }
    : { body: "#FFD79F", accent: "#F2A65A", belly: "#FFF1DC" };

  const dark = "#3a3350";
  const lx = look ? look.x : 0, ly = look ? look.y : 0;
  const ox = Math.max(-3.2, Math.min(3.2, lx * 3.2));
  const oy = Math.max(-2.4, Math.min(2.4, ly * 2.4));

  return (
    <svg width="200" height="200" viewBox="0 0 200 200" className="bv-sway">
      <g className="bv-breathe">
        <ellipse cx="78" cy="168" rx="16" ry="10" fill={c.accent} />
        <ellipse cx="122" cy="168" rx="16" ry="10" fill={c.accent} />
        <ellipse cx="100" cy="112" rx="62" ry="58" fill={c.body} />
        <ellipse cx="100" cy="126" rx="40" ry="34" fill={c.belly} opacity="0.9" />
        <ellipse cx="44" cy="120" rx="11" ry="15" fill={c.body} />
        <ellipse cx="156" cy="120" rx="11" ry="15" fill={c.body} />
        <ellipse cx="80" cy="104" rx="8.5" ry="10" fill={dark} />
        <ellipse cx="120" cy="104" rx="8.5" ry="10" fill={dark} />
        <path d="M87 130 Q100 141 113 130" stroke={dark} strokeWidth="3.5" fill="none" strokeLinecap="round" />
      </g>
    </svg>
  );
}

function StatPill({ icon: Icon, value, hue }) {
  const color = value < 25 ? "#E8657A" : value < 50 ? "#E8A33C" : hue;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: "6px", fontSize: "12px" }}>
      <Icon />
      <div style={{ width: 34, height: 6, borderRadius: 99, background: "rgba(0,0,0,0.10)" }}>
        <div style={{ width: `${value}%`, height: "100%", borderRadius: 99, background: color, transition: "width .4s ease" }} />
      </div>
    </div>
  );
}

function DeviceButton({ icon: Icon, label, color, onClick, disabled }) {
  return (
    <button onClick={onClick} disabled={disabled} className="bv-btn" style={{
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: "8px",
      padding: "10px", borderRadius: "16px", background: "rgba(255,255,255,0.16)", border: "none",
      color: "#fff", fontSize: "11px", fontWeight: 700, cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? 0.5 : 1
    }}>
      <div style={{ width: 38, height: 38, borderRadius: "50%", background: color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "19px" }}>
        <Icon />
      </div>
      <span>{label}</span>
    </button>
  );
}

export default function BichoVivo() {
  const [stats, setStats] = useState(INITIAL);
  const [name, setName] = useState("Pix");
  const [createdAt, setCreatedAt] = useState(Date.now());
  const [sleeping, setSleeping] = useState(false);
  const [alive, setAlive] = useState(true);
  const [nowTs, setNowTs] = useState(Date.now());
  const [emotes, setEmotes] = useState([]);
  const [msg, setMsg] = useState(null);
  const [irrit, setIrrit] = useState(0);
  const [isAngry, setIsAngry] = useState(false);
  const [look, setLook] = useState({ x: 0, y: 0 });
  const [muted, setMuted] = useState(false);
  const [temperament, setTemperament] = useState("Tranquilo");

  const audioRef = useRef(null);
  if (!audioRef.current) audioRef.current = createAudio();
  const play = (n) => audioRef.current && audioRef.current.play(n);

  const statsRef = useRef(stats); statsRef.current = stats;
  const temper = TEMPERS[temperament] || TEMPERS["Tranquilo"];
  const pokeTimesRef = useRef([]);
  const emoTimerRef = useRef(null);

  const ageS = Math.max(0, Math.floor((nowTs - createdAt) / 1000));
  const stage = stageOf(ageS);
  const dia = Math.floor(ageS / 30) + 1;

  let displayMood = !alive ? "ko" : isAngry ? "angry" : sleeping ? "sleep" : baseMood(stats);

  const addEmote = useCallback((char) => {
    const id = Date.now() + Math.random();
    setEmotes((e) => [...e, { id, char, x: (Math.random() * 16 - 8).toFixed(0) }]);
    setTimeout(() => setEmotes((e) => e.filter((it) => it.id !== id)), 1300);
  }, []);

  const showMsg = useCallback((text) => {
    const id = Date.now(); setMsg({ text, id });
    setTimeout(() => setMsg((m) => (m && m.id === id ? null : m)), 2200);
  }, []);

  const bump = (patch) => setStats((s) => { const n = { ...s }; for (const k in patch) n[k] = clamp((s[k] || 0) + patch[k]); return n; });
  const bumpIrrit = (d) => setIrrit((v) => clamp(v + (d > 0 ? d * temper.anger : d * temper.calm)));

  useEffect(() => { const id = setInterval(() => setNowTs(Date.now()), 1000); return () => clearInterval(id); }, []);
  useEffect(() => { audioRef.current.setMuted(muted); }, [muted]);

  useEffect(() => {
    if (!alive) return;
    const id = setInterval(() => {
      setStats((s) => {
        let n = { ...s };
        if (sleeping) {
          n.energia = clamp(s.energia + 6); n.saciedade = clamp(s.saciedade - 1);
          n.higiene = clamp(s.higiene - 0.5); n.saude = clamp(s.saude + (s.saciedade > 30 ? 1 : 0));
        } else {
          n.saciedade = clamp(s.saciedade - 2); n.felicidade = clamp(s.felicidade - 1 * temper.happyDecay);
          n.energia = clamp(s.energia - 1.5); n.higiene = clamp(s.higiene - 1);
          if (s.saciedade < 15 || s.higiene < 15 || s.energia < 10) n.saude = clamp(s.saude - 1.5);
        }
        if (n.saude <= 0) { n.saude = 0; setAlive(false); }
        return n;
      });
      setIrrit((v) => {
        let n = v - 2;
        if (!sleeping && (statsRef.current.saciedade < 12 || statsRef.current.higiene < 12)) n += 4 * temper.anger;
        return clamp(n);
      });
    }, TICK_MS);
    return () => clearInterval(id);
  }, [sleeping, alive, temper]);

  useEffect(() => {
    if (sleeping && stats.energia >= 100) { setSleeping(false); showMsg("Acordou renovado! ☀️"); }
  }, [stats.energia, sleeping, showMsg]);

  useEffect(() => {
    setIsAngry((prev) => (!prev && irrit >= 70) ? true : (prev && irrit <= 30) ? false : prev);
  }, [irrit]);

  const pokeCreature = () => {
    if (!alive) return;
    if (sleeping) { setSleeping(false); addEmote("❗"); showMsg("Acordou assustado! 😳"); bumpIrrit(12); return; }
    if (isAngry) { play("annoyed"); addEmote("💢"); showMsg("Não me cutuca! 😠"); bumpIrrit(6); return; }
    const now = performance.now();
    pokeTimesRef.current = pokeTimesRef.current.filter((t) => now - t < 1600); pokeTimesRef.current.push(now);
    if (pokeTimesRef.current.length >= 4) { addEmote("💢"); play("annoyed"); bump({ felicidade: -3 }); bumpIrrit(16); showMsg("Ei! Para! 😤"); }
    else { addEmote("💗"); play("chirp"); bump({ felicidade: 2 }); bumpIrrit(-4); showMsg("Hihi! 😄"); }
  };

  const feed = () => {
    if (!alive || sleeping) return; if (isAngry) { showMsg("Bravo demais pra comer! 😠"); return; }
    if (stats.saciedade >= 98) { bumpIrrit(8); return showMsg("Já está cheio! 🍃"); }
    bump({ saciedade: 25, felicidade: 3, higiene: -3 }); addEmote("🍎"); play("eat"); showMsg("Hmmm, que delícia! 😋");
  };

  const playGame = () => {
    if (!alive || sleeping) return; if (isAngry) { showMsg("Não quero brincar agora! 😠"); return; }
    if (stats.energia < 12) { showMsg("Muito cansado 😴"); return; }
    bump({ felicidade: 20 * temper.play, energia: -12, saciedade: -6 }); addEmote("⚽"); play("play"); showMsg("Yuhuu! 🎉");
  };

  const clean = () => {
    if (!alive || sleeping) return;
    bump({ higiene: 35, felicidade: 3 }); bumpIrrit(-4); addEmote("🫧"); play("clean"); showMsg("Tão limpinho! ✨");
  };

  const pet = () => {
    if (!alive || sleeping) return;
    bump({ felicidade: 12, saude: 2 }); bumpIrrit(-22); addEmote("💕"); play("purr");
    showMsg(isAngry ? "Calma… tá tudo bem 🥺" : "Ronrom 🥰");
  };

  const toggleSleep = () => {
    if (!alive) return; const going = !sleeping; setSleeping(going);
    play(going ? "sleep" : "wake"); showMsg(going ? "Boa noite… 💤" : "Bom dia! ☀️");
  };

  const restart = () => {
    setStats(INITIAL); setAlive(true); setSleeping(false); setIrrit(0); setIsAngry(false);
    setCreatedAt(Date.now()); setTemperament(pickTemper());
    play("levelup"); showMsg("Um novo começo! 🌱");
  };

  const busy = sleeping || !alive;

  return (
    <div className="bv-root" style={{ minHeight: "100vh", width: "100%", display: "flex", alignItems: "center", justifyContent: "center", padding: "16px", background: "linear-gradient(180deg,#C3B5FF 0%,#E9C7FF 45%,#FFD9C2 100%)", overflow: "hidden" }}>
      <div style={{ position: "absolute", borderRadius: "50%", width: 160, height: 160, top: 40, left: 24, background: "rgba(255,255,255,0.25)", filter: "blur(2px)" }} />

      <div style={{ width: "100%", maxWidth: 380 }}>
        <div style={{ background: "linear-gradient(160deg,#8B7BF0 0%,#6C5CE7 100%)", borderRadius: "46px 46px 40px 40px", padding: 18, boxShadow: "0 24px 60px rgba(76,60,160,0.45)" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16, paddingBottom: 16, borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: "#FFD24D" }} />
              <span style={{ color: "#fff", fontWeight: 900, letterSpacing: "1.5px", fontSize: 13 }}>BICHOVIVO</span>
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: "#FF8FA3" }} />
            </div>
            <button onClick={() => setMuted((m) => !m)} style={{ background: "rgba(255,255,255,0.16)", border: "none", borderRadius: "50%", width: 32, height: 32, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", color: "#fff", fontSize: 18 }}>
              {muted ? <VolumeX /> : <Volume2 />}
            </button>
          </div>

          <div style={{ borderRadius: 30, background: "linear-gradient(180deg,#EAF7F0 0%,#FBF4E7 100%)", boxShadow: "inset 0 3px 14px rgba(0,0,0,0.18)", border: "3px solid rgba(0,0,0,0.10)", minHeight: 320, display: "flex", flexDirection: "column", alignItems: "center", padding: "16px" }}>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 8, marginBottom: 16, width: "100%" }}>
              <div style={{ fontSize: 17, fontWeight: 900, color: "#3a3350" }}>{name}</div>
              <span style={{ fontSize: 10.5, fontWeight: 700, color: "#6C5CE7", background: "rgba(108,92,231,0.12)", borderRadius: "50%", padding: "4px 12px" }}>{temper.emoji} {temperament}</span>
            </div>

            <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", width: "100%" }} onPointerDown={pokeCreature}>
              <div style={{ transform: `scale(${stage.scale})`, cursor: "pointer" }}>
                <Creature mood={displayMood} saude={stats.saude} stage={stage} look={look} />
              </div>
              {emotes.map((e) => (<span key={e.id} className="bv-emote" style={{ position: "absolute", bottom: 70, left: `calc(50% + ${e.x}px)`, fontSize: 26 }}>{e.char}</span>))}
            </div>

            <div style={{ borderRadius: "50%", padding: "6px 12px", marginTop: 12, background: "rgba(108,92,231,0.10)" }}>
              <span style={{ fontSize: 12.5, fontWeight: 700, color: "#5a5270" }}>{msg ? msg.text : MOOD_MSG[displayMood]}</span>
            </div>

            {!alive && (
              <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center", background: "rgba(28,22,58,0.82)", borderRadius: 27 }}>
                <div style={{ fontSize: 40 }}>😵</div>
                <div style={{ color: "#fff", fontWeight: 900, fontSize: 17, marginTop: 16 }}>{name} desmaiou!</div>
                <button onClick={restart} style={{ marginTop: 24, borderRadius: "50%", padding: "10px 20px", background: "#7CF5D0", color: "#0f3b30", fontWeight: 800, fontSize: 14, border: "none", cursor: "pointer" }}>🌱 Recomeçar</button>
              </div>
            )}
          </div>

          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px", marginTop: 12, marginBottom: 12, gap: 8 }}>
            <StatPill icon={Apple} value={stats.saciedade} hue="#FF8FA3" />
            <StatPill icon={Heart} value={stats.felicidade} hue="#FF6FA5" />
            <StatPill icon={Sun} value={stats.energia} hue="#FFC04D" />
            <StatPill icon={Droplets} value={stats.higiene} hue="#74C0FC" />
            <StatPill icon={Heart} value={stats.saude} hue="#5FD0C5" />
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8 }}>
            <DeviceButton icon={Apple} label="Alimentar" color="#FF8FA3" onClick={feed} disabled={busy} />
            <DeviceButton icon={Gamepad2} label="Brincar" color="#5FD0C5" onClick={playGame} disabled={busy} />
            <DeviceButton icon={sleeping ? Sun : Moon} label={sleeping ? "Acordar" : "Dormir"} color="#9B8CFF" onClick={toggleSleep} disabled={!alive} />
            <DeviceButton icon={Droplets} label="Limpar" color="#74C0FC" onClick={clean} disabled={busy} />
            <DeviceButton icon={Heart} label="Carinho" color="#FF6FA5" onClick={pet} disabled={busy} />
            <DeviceButton icon={Radar} label="Info" color="#FFC04D" onClick={() => showMsg("v1.0 online!")} disabled={!alive} />
          </div>
        </div>

        <p style={{ textAlign: "center", marginTop: 16, fontSize: 11, color: "#6b5f9e", fontWeight: 600 }}>
          Toque no bichinho pra interagir · som no 🔊
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<BichoVivo />);
</script>
</body>
</html>
